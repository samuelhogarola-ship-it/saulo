<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saulo Fitness | Web en producción</title>
    <meta
      name="description"
      content="Saulo Fitness está preparando su nueva web oficial."
    />
    <link rel="canonical" href="https://saulofitness.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Saulo Fitness" />
    <meta property="og:description" content="Web oficial en producción." />
    <meta
      property="og:image"
      content="https://saulofitness.com/saulo-fitness-og.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Saulo Fitness" />
    <meta name="twitter:description" content="Web oficial en producción." />
    <meta
      name="twitter:image"
      content="https://saulofitness.com/saulo-fitness-og.png"
    />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #07030d;
        --panel: rgba(25, 13, 42, 0.76);
        --line: rgba(211, 180, 255, 0.18);
        --text: #fff;
        --muted: rgba(250, 246, 255, 0.68);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100svh;
        padding: 24px;
        background:
          radial-gradient(
            circle at 50% 18%,
            rgba(141, 55, 255, 0.28),
            transparent 34%
          ),
          linear-gradient(180deg, #10051c 0%, var(--bg) 62%, #030106 100%);
        color: var(--text);
        font-family:
          Montserrat,
          Poppins,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      main {
        width: min(940px, 100%);
        padding: clamp(38px, 7vw, 78px);
        border: 1px solid var(--line);
        border-radius: clamp(28px, 4vw, 48px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 44%),
          var(--panel);
        text-align: center;
        box-shadow:
          0 34px 90px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      img {
        width: clamp(108px, 15vw, 156px);
        height: clamp(108px, 15vw, 156px);
        padding: 18px;
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.96);
        object-fit: contain;
        box-shadow: 0 24px 64px rgba(111, 39, 255, 0.32);
      }

      p {
        margin: 30px 0 0;
        color: var(--muted);
        font-size: clamp(0.9rem, 1.4vw, 1.04rem);
        font-weight: 850;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 12ch;
        margin: 18px auto 0;
        font-size: clamp(3rem, 8.8vw, 6.8rem);
        font-weight: 950;
        line-height: 0.9;
        letter-spacing: -0.08em;
        text-transform: uppercase;
      }

      .brand {
        display: block;
        margin-top: 30px;
        color: rgba(250, 246, 255, 0.82);
        font-size: clamp(0.95rem, 2vw, 1.22rem);
        font-weight: 900;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }

        main {
          padding: 34px 22px;
          border-radius: 30px;
        }

        h1 {
          font-size: clamp(3rem, 16vw, 4.5rem);
        }

        .brand {
          letter-spacing: 0.24em;
        }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="production-title">
      <img src="./saulo-logo-transparent.png" alt="Logotipo de Saulo Fitness" />
      <p>Nueva web oficial</p>
      <h1 id="production-title">Web en producción</h1>
      <span class="brand">Saulo Fitness</span>
    </main>
  </body>
</html>
