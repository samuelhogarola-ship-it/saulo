<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saulo Fitness APP</title>
    <meta
      name="description"
      content="Saulo Fitness APP: tu mejor version, nuestra mision."
    />
    <meta property="og:title" content="Saulo Fitness APP" />
    <meta
      property="og:description"
      content="La landing principal de Saulo Fitness APP para presentar la marca y la experiencia del producto."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://saulofitness.com/aaa.png" />
    <meta name="theme-color" content="#09030f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />

  <body class="is-production-hold">
    <main class="landing-shell">
      <section class="hero-stage" aria-labelledby="landing-title">
        <div class="background-photo" aria-hidden="true"></div>
        <div class="background-vignette" aria-hidden="true"></div>
        <div class="background-glow glow-top" aria-hidden="true"></div>
        <div class="background-glow glow-bottom" aria-hidden="true"></div>

        <img
          class="brand-mark"
          src="./Captura%20de%20pantalla%202026-06-10%20a%20las%2020.40.52.png"

        <div class="hero-copy">
          <p class="brand-eyebrow">Saulo Fitness APP</p>
          <h1 id="landing-title">Web en produccion, nos veremos pronto.</h1>
        </div>

        <footer class="site-footer" aria-label="Pie de pagina">
          <div class="footer-brand">
            <p class="footer-kicker">Saulo Fitness APP</p>
            <p class="footer-copy">Copyright Saulo Fitness 2026.</p>
          </div>

          <div class="footer-links">
            <div>
              <p class="footer-title">Legal</p>
              <div class="footer-list">
                <span>Aviso legal</span>
                <span>Privacidad</span>
                <span>Cookies</span>
              </div>
            </div>

            <div>
              <p class="footer-title">Contacto</p>
              <div class="footer-list">
                <span>Web en produccion</span>
                <span>Saulo Fitness APP</span>
              </div>
            </div>
          </div>

          <div class="footer-credit">
            by
            <a
              href="https://webfuengirola.com"
              target="_blank"
              rel="noreferrer"
            >
              Web Fuengirola Studio
            </a>
          </div>
        </footer>
      </section>
